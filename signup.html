<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Farmio</title>

<style>
* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    background: url("signup1.jpg") no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

.signup-card {
    background: #ffffff;
    width: 360px;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    text-align: center;
}

.signup-card h2 {
    margin-bottom: 5px;
}

.signup-card p {
    font-size: 14px;
    color: #777;
    margin-bottom: 25px;
}

.signup-card label {
    display: block;
    text-align: left;
    font-weight: bold;
    margin-bottom: 5px;
    margin-top: 10px;
    color: #333;
    font-size: 14px;
}

.signup-card input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border: none;
    border-bottom: 1px solid #ccc;
    outline: none;
    font-size: 14px;
}

.signup-card input:focus {
    border-bottom-color: #1a73e8;
}

.signup-card button {
    width: 100%;
    padding: 12px;
    background: #1a73e8;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 15px;
    cursor: pointer;
    margin-top: 10px;
}

.signup-card button:hover {
    background: #0f5fd8;
}

.signin-link {
    font-size: 13px;
    margin-top: 15px;
}

.signin-link a {
    color: #1a73e8;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="signup-card">
    <h2>Sign up</h2>
    <p>Create your account</p>

    <form id="signupForm">
        <label for="fname">First Name</label>
        <input id="fname" type="text" placeholder="Enter First Name" required>

        <label for="lname">Last Name</label>
        <input id="lname" type="text" placeholder="Enter Last Name" required>

        <label for="email">Email</label>
        <input id="email" type="email" placeholder="Enter Email" required>

        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter Password" required>

        <button type="submit">Sign up</button>
    </form>

    <div class="signin-link">
        Already have an account? <a href="login.html">Sign in</a>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCiEvlgpEHo2YG-swUgsQzUM3RwYXXM8Jo",
  authDomain: "farmio-30e87.firebaseapp.com",
  projectId: "farmio-30e87",
  storageBucket: "farmio-30e87.appspot.com",
  messagingSenderId: "619990775055",
  appId: "1:619990775055:web:e3a1e661e8e696cd4c7a7a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ✅ Strict email validation
// Stricter email validation to prevent numbers-only emails
function isValidEmail(email) {
    const re = /^[a-zA-Z][a-zA-Z0-9._%+-]*@[a-zA-Z.-]+\.[a-zA-Z]{2,}$/;
    return re.test(email);
}

// Signup logic
document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const fNameEl = document.getElementById("fname");
    const lNameEl = document.getElementById("lname");
    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");

    const fName = fNameEl.value.trim();
    const lName = lNameEl.value.trim();
    const email = emailEl.value.trim();
    const password = passwordEl.value;

    if (!fName || !lName || !email || !password) {
        alert("Please fill all fields");
        return;
    }

    if (!isValidEmail(email)) {
        alert("Please enter a valid email address");
        return;
    }

    if (password.length < 6) {
        alert("Password must be at least 6 characters");
        return;
    }

    try {
        const userCred = await createUserWithEmailAndPassword(auth, email, password);

        await setDoc(doc(db, "users", userCred.user.uid), {
            firstName: fName,
            lastName: lName,
            email: email
        });

        alert("Account created successfully ✅");

        // Clear fields
        fNameEl.value = "";
        lNameEl.value = "";
        emailEl.value = "";
        passwordEl.value = "";

        // Redirect to login
        window.location.href = "login.html";

    } catch (error) {
        // ✅ Firebase error handling
        switch (error.code) {
            case "auth/email-already-in-use":
                alert("This email is already registered. Please login.");
                break;
            case "auth/invalid-email":
                alert("Invalid email format.");
                break;
            case "auth/weak-password":
                alert("Password should be at least 6 characters.");
                break;
            default:
                alert(error.message);
        }
    }
});
</script>

</body>
</html>
