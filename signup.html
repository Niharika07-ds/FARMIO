<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Famio</title>

<style>
* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    background: url("signup1.jpg") no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

.signup-card {
    background: #ffffff;
    width: 360px;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    text-align: center;
}

.signup-card h2 {
    margin-bottom: 5px;
}

.signup-card p {
    font-size: 14px;
    color: #777;
    margin-bottom: 25px;
}

.signup-card input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: none;
    border-bottom: 1px solid #ccc;
    outline: none;
    font-size: 14px;
}

.signup-card input:focus {
    border-bottom-color: #1a73e8;
}

.signup-card button.main-btn {
    width: 100%;
    padding: 12px;
    background: #1a73e8;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 15px;
    cursor: pointer;
    margin-top: 10px;
}

.signup-card button.main-btn:hover {
    background: #0f5fd8;
}

.divider {
    font-size: 12px;
    color: #999;
    margin: 20px 0 10px;
}

.social-buttons {
    display: flex;
    gap: 12px;
}

.social {
    flex: 1;
    padding: 10px;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    border: none;
}

.social.google {
    background: white;
    border: 1px solid #ddd;
}

.social.facebook {
    background: #1877f2;
    color: white;
}

.signin-link {
    font-size: 13px;
    margin-top: 15px;
}

.signin-link a {
    color: #1a73e8;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="signup-card">
    <h2>Sign up</h2>
    <p>Sign up to continue</p>

    <!-- Email/Password Signup (optional, frontend only) -->
    <form>
        <input type="text" placeholder="Name" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
        <button type="submit" class="main-btn">Sign up</button>
    </form>

    <div class="divider">ACCESS QUICKLY</div>

    <div class="social-buttons">
        <button class="social google" onclick="googleLogin()">Google</button>
        <button class="social facebook" onclick="facebookLogin()">Facebook</button>
    </div>

    <div class="signin-link">
        Already have an account? <a href="login.html">Sign in</a>
    </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  FacebookAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* 🔥 REPLACE WITH YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const googleProvider = new GoogleAuthProvider();
const facebookProvider = new FacebookAuthProvider();

window.googleLogin = () => {
  signInWithPopup(auth, googleProvider)
    .then(() => window.location.href = "dashboard.html")
    .catch(err => alert(err.message));
};

window.facebookLogin = () => {
  signInWithPopup(auth, facebookProvider)
    .then(() => window.location.href = "dashboard.html")
    .catch(err => alert(err.message));
};
</script>

</body>
</html>
