<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Famio</title>

<style>
* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    background: url("signup1.jpg") no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

.signup-card {
    background: #ffffff;
    width: 360px;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    text-align: center;
}

.signup-card h2 {
    margin-bottom: 5px;
}

.signup-card p {
    font-size: 14px;
    color: #777;
    margin-bottom: 25px;
}

.signup-card input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: none;
    border-bottom: 1px solid #ccc;
    outline: none;
    font-size: 14px;
}

.signup-card input:focus {
    border-bottom-color: #1a73e8;
}

.signup-card button.main-btn {
    width: 100%;
    padding: 12px;
    background: #1a73e8;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 15px;
    cursor: pointer;
    margin-top: 10px;
}

.signup-card button.main-btn:hover {
    background: #0f5fd8;
}

.divider {
    font-size: 12px;
    color: #999;
    margin: 20px 0 10px;
}

.social-buttons {
    display: flex;
    gap: 12px;
}

.social {
    flex: 1;
    padding: 10px;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    border: none;
}

.social.google {
    background: white;
    border: 1px solid #ddd;
}

.social.facebook {
    background: #1877f2;
    color: white;
}

.signin-link {
    font-size: 13px;
    margin-top: 15px;
}

.signin-link a {
    color: #1a73e8;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="signup-card">
    <h2>Sign up</h2>
    <p>Sign up to continue</p>

    <!-- Email/Password Signup (optional, frontend only) -->
<form onsubmit="signup(event)">
    <input id="fname" type="text" placeholder="First Name" required>
    <input id="lname" type="text" placeholder="Last Name" required>
    <input id="email" type="email" placeholder="Email" required>
    <input id="password" type="password" placeholder="Password" required>
    <button type="submit" class="main-btn">Sign up</button>
</form>

    <div class="divider">ACCESS QUICKLY</div>

    <div class="social-buttons">
        <button class="social google" onclick="googleLogin()">Google</button>
        <button class="social facebook" onclick="facebookLogin()">Facebook</button>
    </div>

    <div class="signin-link">
        Already have an account? <a href="login.html">Sign in</a>
    </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import { 
  getAuth, 
  createUserWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  setDoc 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// ✅ YOUR REAL FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCiEvlgpEHo2YG-swUgsQzUM3RwYXXM8Jo",
  authDomain: "farmio-30e87.firebaseapp.com",
  projectId: "farmio-30e87",
  storageBucket: "farmio-30e87.firebasestorage.app",
  messagingSenderId: "619990775055",
  appId: "1:619990775055:web:e3a1e661e8e696cd4c7a7a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ✅ SIGNUP FUNCTION
window.signup = async function (event) {
  event.preventDefault(); // STOP PAGE RELOAD

  const fname = document.getElementById("fname").value;
  const lname = document.getElementById("lname").value;
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, password);

    // Save extra user data
    await setDoc(doc(db, "users", userCred.user.uid), {
      firstName: fname,
      lastName: lname,
      email: email
    });

    alert("Account created successfully ✅");
    window.location.href = "login.html";

  } catch (error) {
    alert(error.message);
  }
};
</script>
</body>
</html>
