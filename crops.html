<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Major Crops</title>

  <style>
    /* RESET */
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: Arial, sans-serif;

      /* Background Image */
      background-image: url('crop.png');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
      background-attachment: fixed;

      display: flex;
      flex-direction: column;
      min-height: 100vh;   /* Important for sticky footer */

      color: #ffffff;
      position: relative;
    }

    /* Dark Overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: -1;
    }

    /* Main Content Wrapper */
    .main-content {
      flex: 1;   /* Pushes footer to bottom */
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    h1 {
      margin-top: 60px;
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 16px;
      opacity: 0.9;
    }

    .crop-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      margin-top: 50px;
    }

    .crop-day {
      width: 240px;
      height: 120px;
      background: linear-gradient(135deg, #ffcc33, #ff9900);
      color: #2b2b2b;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
      transition: all 0.3s ease;
    }

    .crop-day span {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .crop-day:hover {
      transform: translateY(-8px) scale(1.05);
      background: linear-gradient(135deg, #ffa500, #ffcc33);
    }

    /* ================= FOOTER ================= */

    .footer {
      background: rgba(0, 0, 0, 0.9);
      color: #ffffff;
      text-align: center;
      padding: 20px 10px;
    }

    .footer p {
      margin: 5px 0;
    }

    .footer .quote {
      font-size: 18px;
      font-style: italic;
      color: #d4ffd4;
    }

    .footer .copyright {
      font-size: 14px;
      opacity: 0.8;
    }

    /* Google Translate */
    #google_translate_element {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 1000;
    }
  </style>
</head>

<body>

  <div class="main-content">
    <h1>🌾 MAJOR CROPS IN INDIA</h1>
    <div class="subtitle">Select a season to explore crops grown in India</div>

    <div class="crop-container">
      <div class="crop-day" onclick="location.href='kharif.html'">
        <span>🌧️</span> KHARIF
      </div>

      <div class="crop-day" onclick="location.href='rabi.html'">
        <span>❄️</span> RABI
      </div>

      <div class="crop-day" onclick="location.href='zadi.html'">
        <span>☀️</span> ZAID
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <p class="quote">"If the farmer is rich, then so is the nation."</p>
    <p class="copyright">© 2026 Farmio. All rights reserved.</p>
  </div>

  <!-- Google Translate -->
  <div id="google_translate_element"></div>

  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,hi,mr,or,te',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>

  <script
    src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
  </script>

</body>
</html>
