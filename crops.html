<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CROPS</title>

<style>
:root {
  --bg-light: #e6f6d6;
  --bg-dark: #0f1a12;
  --card-light: #f9fff4;
  --card-dark: #1b2a20;
  --text-light: #2f4f2f;
  --text-dark: #e5f6e5;
  --accent: #2e7d32;
}

body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: var(--bg-light);
  color: var(--text-light);
  min-height: 100vh;
  transition: 0.3s;
}

body.dark {
  background: var(--bg-dark);
  color: var(--text-dark);
}

/* 🌙 Dark mode button (pill style like image) */
.toggle {
  position: fixed;
  top: 12px;
  left: 12px;
  padding: 6px 14px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  background: #2e7d32;
  color: white;
  font-size: 0.85rem;
  font-weight: 600;
  z-index: 1000;
}

/* 🧭 Breadcrumb (subtle, not dominant) */
.breadcrumb {
  max-width: 1200px;
  margin: 70px auto 10px;
  padding: 0 20px;
  font-size: 0.85rem;
}

.breadcrumb a {
  color: #4caf50;
  text-decoration: none;
  font-weight: 600;
}

/* 📱 Grid – centered like image */
.gif-gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  padding: 20px 40px 60px;
  max-width: 900px;
  margin: 150px auto 40px;
}
/* Card style */
.gif-container {
  background: var(--card-light);
  border: 1.8px solid #b6d7a8;
  border-radius: 16px;
  padding: 14px;
  text-align: left;
  transition: 0.25s;
}

body.dark .gif-container {
  background: var(--card-dark);
  border-color: #355f3b;
}

.gif-container:hover {
  transform: translateY(-4px);
}

/* Image style */
.crop-img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 12px;
  margin-top: 8px;
}

/* Title */
h2 {
  margin: 0;
  font-size: 1.05rem;
}

a {
  text-decoration: none;
  color: #2e7d32;
  font-weight: 700;
}

/* 🌐 Translator */
#google_translate_element {
  position: fixed;
  top: 10px;
  right: 10px;
  background: white;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 0.8rem;
}

</style>
</head>

<body>

<button class="toggle" onclick="toggleMode()">🌙 Dark Mode</button>

<main class="gif-gallery">

<section class="gif-container">
  <h2><a href="wheat.html">WHEAT</a></h2>
  <a href="wheat.html"><img src="wheat1.jpg" class="crop-img"></a>
</section>

<section class="gif-container">
  <h2><a href="barley.html">BARLEY</a></h2>
  <a href="barley.html"><img src="barely1.jpg" class="crop-img"></a>
</section>

<section class="gif-container">
  <h2><a href="oats.html">OATS</a></h2>
  <a href="oats.html"><img src="oats1.jpg" class="crop-img"></a>
</section>

<section class="gif-container">
  <h2><a href="gram.html">GRAM</a></h2>
  <a href="gram.html"><img src="gram2.jpg" class="crop-img"></a>
</section>

<section class="gif-container">
  <h2><a href="mustard.html">MUSTARD</a></h2>
  <a href="mustard.html"><img src="mustared1.avif" class="crop-img"></a>
</section>

<section class="gif-container">
  <h2><a href="linseed.html">LINSEED</a></h2>
  <a href="linseed.html"><img src="linseed1.jpg" class="crop-img"></a>
</section>

</main>

<div id="google_translate_element"></div>

<script>
function toggleMode() {
  document.body.classList.toggle("dark");
}

function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'en',
    includedLanguages: 'en,hi,mr,or,te',
    autoDisplay: false
  }, 'google_translate_element');
}
</script>

<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
