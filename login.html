<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login & Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Your CSS -->
    <link rel="stylesheet" href="./login.css">
</head>

<body>

<!-- ================= SIGN UP ================= -->
<div class="container" id="signup" style="display:none;">
    <h1 class="form-title">Register</h1>

    <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="fName" placeholder="First Name">
    </div>

    <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="lName" placeholder="Last Name">
    </div>

    <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="rEmail" placeholder="Email">
    </div>

    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="rPassword" placeholder="Password">
    </div>

    <button type="button" class="btn" id="submitSignUp">Sign Up</button>

    <p class="or">---------- or ----------</p>

    <div class="links">
        <p>Already have an account?</p>
        <button id="signInButton">Sign In</button>
    </div>
</div>

<!-- ================= SIGN IN ================= -->
<div class="container" id="signIn">
    <h1 class="form-title">Sign In</h1>

    <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Password">
    </div>

    <button type="button" class="btn" id="submitSignIn">Sign In</button>

    <p class="or">---------- or ----------</p>

    <div class="links">
        <p>Don’t have an account?</p>
        <button id="signUpButton">Sign Up</button>
    </div>
</div>

<!-- ================= TOGGLE SCRIPT ================= -->
<script>
const signUpButton = document.getElementById('signUpButton');
const signInButton = document.getElementById('signInButton');
const signInForm = document.getElementById('signIn');
const signUpForm = document.getElementById('signup');

signUpButton.onclick = () => {
    signInForm.style.display = "none";
    signUpForm.style.display = "block";
};

signInButton.onclick = () => {
    signUpForm.style.display = "none";
    signInForm.style.display = "block";
};
</script>

<!-- ================= FIREBASE AUTH SCRIPT ================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
import {
  getAuth,
  setPersistence,
  browserLocalPersistence,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";
import {
  getFirestore,
  setDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

// ======= USE SAME FIREBASE PROJECT FOR ALL PAGES =======
const firebaseConfig = {
  apiKey: "AIzaSyBqX1e9865_CMVhZ_tCNlmhKSijemufGTo",
  authDomain: "luna-ac909.firebaseapp.com",
  projectId: "luna-ac909",
  storageBucket: "luna-ac909.firebasestorage.app",
  messagingSenderId: "237924409569",
  appId: "1:237924409569:web:834d6eb59d3536ae7e57a0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ======= ENABLE PERSISTENCE =======
setPersistence(auth, browserLocalPersistence)
  .then(() => console.log("Persistence enabled"))
  .catch(err => console.error(err));

// -------- SIGN UP --------
document.getElementById("submitSignUp").addEventListener("click", async () => {
  try {
    const fName = document.getElementById("fName").value;
    const lName = document.getElementById("lName").value;
    const email = document.getElementById("rEmail").value;
    const password = document.getElementById("rPassword").value;

    const userCred = await createUserWithEmailAndPassword(auth, email, password);

    await setDoc(doc(db, "users", userCred.user.uid), {
      firstName: fName,
      lastName: lName,
      email: email
    });

    // ✅ NO localStorage here
    window.location.href = "dashboard.html";

  } catch (err) {
    alert(err.message);
  }
});

// -------- SIGN IN --------
document.getElementById("submitSignIn").addEventListener("click", async () => {
  try {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const userCred = await signInWithEmailAndPassword(auth, email, password);

    // ✅ NO localStorage here
    window.location.href = "dashboard.html";

  } catch (err) {
    alert(err.message);
  }
});
</script>

</body>
</html>
