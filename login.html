<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login & Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./login.css">
</head>

<body>

<!-- SIGN UP FORM -->
<div class="container" id="signup" style="display:none;">
    <h1>Register</h1>

    <label for="fName">First Name</label>
    <input type="text" id="fName" placeholder="Enter First Name">

    <label for="lName">Last Name</label>
    <input type="text" id="lName" placeholder="Enter Last Name">

    <label for="rEmail">Email</label>
    <input type="email" id="rEmail" placeholder="Enter Email">

    <label for="rPassword">Password</label>
    <input type="password" id="rPassword" placeholder="Enter Password">

    <button id="submitSignUp">Sign Up</button>
    <p>Already have an account? <span class="toggle-link" id="signInButton">Sign In</span></p>
</div>

<!-- SIGN IN FORM -->
<div class="container" id="signIn" style="display:block;">
    <h1>Sign In</h1>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter Email">

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter Password">

    <button id="submitSignIn">Sign In</button>
    <p>Don’t have an account? <span class="toggle-link" id="signUpButton">Sign Up</span></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import {
  getFirestore,
  setDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCiEvlgpEHo2YG-swUgsQzUM3RwYXXM8Jo",
  authDomain: "farmio-30e87.firebaseapp.com",
  projectId: "farmio-30e87",
  storageBucket: "farmio-30e87.appspot.com",
  messagingSenderId: "619990775055",
  appId: "1:619990775055:web:e3a1e661e8e696cd4c7a7a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Keep login session
setPersistence(auth, browserLocalPersistence);

// Toggle forms
const signUpButton = document.getElementById('signUpButton');
const signInButton = document.getElementById('signInButton');
const signInForm = document.getElementById('signIn');
const signUpForm = document.getElementById('signup');

signUpButton.onclick = () => {
    signInForm.style.display = "none";
    signUpForm.style.display = "block";
};
signInButton.onclick = () => {
    signUpForm.style.display = "none";
    signInForm.style.display = "block";
};

// SIGN UP
document.getElementById("submitSignUp").addEventListener("click", async () => {
  try {
    const fName = document.getElementById("fName").value.trim();
    const lName = document.getElementById("lName").value.trim();
    const email = document.getElementById("rEmail").value.trim();
    const password = document.getElementById("rPassword").value;

    if (!fName || !lName || !email || !password) {
      alert("Please fill all fields");
      return;
    }

    const userCred = await createUserWithEmailAndPassword(auth, email, password);

    await setDoc(doc(db, "users", userCred.user.uid), {
      firstName: fName,
      lastName: lName,
      email: email
    });

    alert("Account created successfully ✅");
    window.location.href = "dashboard.html";

  } catch (err) {
    if (err.code === "auth/email-already-in-use") {
      alert("Email already registered. Please login.");
    } else if (err.code === "auth/invalid-email") {
      alert("Invalid email format.");
    } else if (err.code === "auth/weak-password") {
      alert("Password should be at least 6 characters.");
    } else {
      alert(err.message);
    }
  }
});

// SIGN IN
document.getElementById("submitSignIn").addEventListener("click", async () => {
  try {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
      alert("Enter email and password");
      return;
    }

    await signInWithEmailAndPassword(auth, email, password);

    alert("Login successful ✅");
    window.location.href = "dashboard.html";

  } catch (err) {
    if (err.code === "auth/user-not-found") {
      alert("No account found. Please sign up.");
    } else if (err.code === "auth/wrong-password") {
      alert("Incorrect password.");
    } else if (err.code === "auth/invalid-email") {
      alert("Invalid email format.");
    } else {
      alert(err.message);
    }
  }
});
</script>

</body>
</html>
