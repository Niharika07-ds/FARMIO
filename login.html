<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register & Login - Farmio</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="./login.css">
</head>

<body>

<!-- SIGNUP FORM -->
<div class="container" id="signup" style="display:none;">
  <h1 class="form-title">Register</h1>
  <form id="signupForm">
    <div id="signUpMessage" class="messageDiv" style="display:none;"></div>

    <div class="input-group">
       <i class="fas fa-user"></i>
       <input type="text" id="fName" placeholder="First Name" required>
       <label for="fName">First Name</label>
    </div>
    <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="lName" placeholder="Last Name" required>
        <label for="lName">Last Name</label>
    </div>
    <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="rEmail" placeholder="Email" required>
        <label for="rEmail">Email</label>
    </div>
    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="rPassword" placeholder="Password" required>
        <label for="rPassword">Password</label>
    </div>

    <button class="btn" id="submitSignUp">Sign Up</button>
  </form>

  <div class="links">
    <p>Already Have an Account?</p>
    <button id="signInButton">Sign In</button>
  </div>
</div>

<!-- LOGIN FORM -->
<div class="container" id="signIn">
  <h1 class="form-title">Sign In</h1>
  <form id="loginForm">
    <div id="signInMessage" class="messageDiv" style="display:none;"></div>

    <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" placeholder="Email" required>
        <label for="email">Email</label>
    </div>
    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Password" required>
        <label for="password">Password</label>
    </div>
    <p class="recover">
      <a href="#">Recover Password</a>
    </p>

    <button class="btn" id="submitSignIn">Sign In</button>
  </form>

  <div class="links">
    <p>Don't have an account yet?</p>
    <button id="signUpButton">Sign Up</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCiEvlgpEHo2YG-swUgsQzUM3RwYXXM8Jo",
  authDomain: "farmio-30e87.firebaseapp.com",
  projectId: "farmio-30e87",
  storageBucket: "farmio-30e87.appspot.com",
  messagingSenderId: "619990775055",
  appId: "1:619990775055:web:e3a1e661e8e696cd4c7a7a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Keep user logged in
setPersistence(auth, browserLocalPersistence);

// Toggle between forms
const signUpBtn = document.getElementById('signUpButton');
const signInBtn = document.getElementById('signInButton');
const signInForm = document.getElementById('signIn');
const signUpForm = document.getElementById('signup');

signUpBtn.addEventListener('click', () => {
    signInForm.style.display = "none";
    signUpForm.style.display = "block";
});
signInBtn.addEventListener('click', () => {
    signInForm.style.display = "block";
    signUpForm.style.display = "none";
});

// Strict email validation
// Stricter email validation to prevent numbers-only emails
function isValidEmail(email) {
    const re = /^[a-zA-Z][a-zA-Z0-9._%+-]*@[a-zA-Z.-]+\.[a-zA-Z]{2,}$/;
    return re.test(email);
}

// Signup logic
document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const fNameEl = document.getElementById("fName");
    const lNameEl = document.getElementById("lName");
    const emailEl = document.getElementById("rEmail");
    const passwordEl = document.getElementById("rPassword");

    const fName = fNameEl.value.trim();
    const lName = lNameEl.value.trim();
    const email = emailEl.value.trim();
    const password = passwordEl.value;

    if (!fName || !lName || !email || !password) {
        alert("Please fill all fields");
        return;
    }

    if (!isValidEmail(email)) {
        alert("Please enter a valid email address");
        return;
    }

    if (password.length < 6) {
        alert("Password must be at least 6 characters");
        return;
    }

    try {
        const userCred = await createUserWithEmailAndPassword(auth, email, password);

        await setDoc(doc(db, "users", userCred.user.uid), { firstName: fName, lastName: lName, email });

        alert("Account created successfully ✅");

        fNameEl.value = "";
        lNameEl.value = "";
        emailEl.value = "";
        passwordEl.value = "";

        window.location.href = "login.html";

    } catch (err) {
        if (err.code === "auth/email-already-in-use") alert("Email already registered.");
        else if (err.code === "auth/invalid-email") alert("Invalid email format.");
        else if (err.code === "auth/weak-password") alert("Password too weak.");
        else alert(err.message);
    }
});

// Login logic
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");

    const email = emailEl.value.trim();
    const password = passwordEl.value;

    if (!email || !password) { alert("Enter email and password"); return; }
    if (!isValidEmail(email)) { alert("Please enter a valid email address"); return; }

    try {
        await signInWithEmailAndPassword(auth, email, password);

        alert("Login successful ✅");

        emailEl.value = "";
        passwordEl.value = "";

        window.location.href = "dashboard.html";
    } catch (err) {
        if (err.code === "auth/user-not-found") alert("No account found. Sign up first.");
        else if (err.code === "auth/wrong-password") alert("Incorrect password.");
        else if (err.code === "auth/invalid-email") alert("Invalid email format.");
        else alert(err.message);
    }
});
</script>

</body>
</html>
