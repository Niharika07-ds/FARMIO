<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register & Login - Farmio</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="./login.css">
</head>

<body>

<!-- SIGNUP FORM -->
<div class="container" id="signup" style="display:none;">
  <h1 class="form-title">Register</h1>
  <form>
    <div id="signUpMessage" class="messageDiv" style="display:none;"></div>

    <div class="input-group">
       <i class="fas fa-user"></i>
       <input type="text" id="fName" placeholder="First Name" required>
       <label for="fName">First Name</label>
    </div>
    <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="lName" placeholder="Last Name" required>
        <label for="lName">Last Name</label>
    </div>
    <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="rEmail" placeholder="Email" required>
        <label for="rEmail">Email</label>
    </div>
    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="rPassword" placeholder="Password" required>
        <label for="rPassword">Password</label>
    </div>

    <button class="btn" id="submitSignUp">Sign Up</button>
  </form>

  <div class="links">
    <p>Already Have an Account?</p>
    <button id="signInButton">Sign In</button>
  </div>
</div>

<!-- LOGIN FORM -->
<div class="container" id="signIn">
  <h1 class="form-title">Sign In</h1>
  <form>
    <div id="signInMessage" class="messageDiv" style="display:none;"></div>

    <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" placeholder="Email" required>
        <label for="email">Email</label>
    </div>
    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Password" required>
        <label for="password">Password</label>
    </div>
    <p class="recover">
      <a href="#">Recover Password</a>
    </p>

    <button class="btn" id="submitSignIn">Sign In</button>
  </form>

  <div class="links">
    <p>Don't have an account yet?</p>
    <button id="signUpButton">Sign Up</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// ✅ Firebase config (corrected storageBucket)
const firebaseConfig = {
  apiKey: "AIzaSyCiEvlgpEHo2YG-swUgsQzUM3RwYXXM8Jo",
  authDomain: "farmio-30e87.firebaseapp.com",
  projectId: "farmio-30e87",
  storageBucket: "farmio-30e87.appspot.com",
  messagingSenderId: "619990775055",
  appId: "1:619990775055:web:e3a1e661e8e696cd4c7a7a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Keep user logged in
setPersistence(auth, browserLocalPersistence);

// Toggle between forms
const signUpButton = document.getElementById('signUpButton');
const signInButton = document.getElementById('signInButton');
const signInForm = document.getElementById('signIn');
const signUpForm = document.getElementById('signup');

signUpButton.addEventListener('click', () => {
    signInForm.style.display = "none";
    signUpForm.style.display = "block";
});
signInButton.addEventListener('click', () => {
    signInForm.style.display = "block";
    signUpForm.style.display = "none";
});

// ✅ Signup logic
document.getElementById("submitSignUp").addEventListener("click", async (e) => {
    e.preventDefault();
    const fName = document.getElementById("fName").value.trim();
    const lName = document.getElementById("lName").value.trim();
    const email = document.getElementById("rEmail").value.trim();
    const password = document.getElementById("rPassword").value;

    if (!fName || !lName || !email || !password) { alert("Please fill all fields"); return; }
    if (password.length < 6) { alert("Password must be at least 6 characters"); return; }

    try {
        const userCred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, "users", userCred.user.uid), { firstName: fName, lastName: lName, email });
        alert("Account created successfully ✅");
        fName.value = lName.value = email.value = password.value = "";
        window.location.href = "login.html"; // or dashboard.html
    } catch (err) {
        if (err.code === "auth/email-already-in-use") alert("Email already registered.");
        else if (err.code === "auth/invalid-email") alert("Invalid email format.");
        else if (err.code === "auth/weak-password") alert("Password too weak.");
        else alert(err.message);
    }
});

// ✅ Login logic
document.getElementById("submitSignIn").addEventListener("click", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) { alert("Enter email and password"); return; }

    try {
        await signInWithEmailAndPassword(auth, email, password);
        alert("Login successful ✅");
        window.location.href = "dashboard.html"; // your dashboard page
    } catch (err) {
        if (err.code === "auth/user-not-found") alert("No account found. Sign up first.");
        else if (err.code === "auth/wrong-password") alert("Incorrect password.");
        else if (err.code === "auth/invalid-email") alert("Invalid email format.");
        else alert(err.message);
    }
});
</script>

</body>
</html>
