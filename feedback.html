<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Experience Feedback</title>

<style>
* {
  box-sizing: border-box;
  font-family: system-ui, sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #2563eb, #0f172a);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.card {
  width: 100%;
  max-width: 450px;
  background: white;
  border-radius: 18px;
  padding: 30px;
  box-shadow: 0 20px 40px rgba(0,0,0,.3);
  text-align: center;
}

.hidden { display: none; }

h2 {
  margin-bottom: 10px;
}

p {
  color: #555;
  margin-bottom: 20px;
}

.rating {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 15px 0;
}

.rating span {
  padding: 10px 14px;
  border-radius: 10px;
  background: #e5e7eb;
  cursor: pointer;
  font-weight: bold;
}

.rating span.active {
  background: #2563eb;
  color: white;
}

.emoji {
  font-size: 28px;
  display: flex;
  justify-content: space-around;
  margin: 15px 0;
}

.emoji span {
  cursor: pointer;
  transition: 0.2s;
}

.emoji span.active {
  transform: scale(1.4);
}

textarea {
  width: 100%;
  height: 90px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  resize: none;
  margin-top: 10px;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 14px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(135deg, #2563eb, #06b6d4);
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.check {
  font-size: 60px;
  color: #22c55e;
}
</style>
</head>

<body>

<div class="card" id="formCard">
  <h2>How was your experience?</h2>
  <p>We’d love to know how this page worked for you.</p>

  <label>Overall Experience</label>
  <div class="rating" id="experienceRating"></div>

  <label>Your Feeling</label>
  <div class="emoji">
    <span onclick="selectMood('😍')">😍</span>
    <span onclick="selectMood('😊')">😊</span>
    <span onclick="selectMood('😐')">😐</span>
    <span onclick="selectMood('😕')">😕</span>
    <span onclick="selectMood('😡')">😡</span>
  </div>

  <textarea id="feedbackText" placeholder="Tell us about your experience... (optional)"></textarea>

  <button onclick="submitFeedback()">Submit Feedback</button>
</div>

<div class="card hidden" id="thankYouCard">
  <div class="check">✓</div>
  <h2>Thank You!</h2>
  <p>Your feedback helps us improve this page.</p>
</div>

<script>
let selectedRating = null;
let selectedMood = "";

function createRating() {
  const container = document.getElementById("experienceRating");
  for (let i = 1; i <= 5; i++) {
    const span = document.createElement("span");
    span.textContent = i;
    span.onclick = () => {
      container.querySelectorAll("span").forEach(s => s.classList.remove("active"));
      span.classList.add("active");
      selectedRating = i;
    };
    container.appendChild(span);
  }
}

function selectMood(mood) {
  selectedMood = mood;
  document.querySelectorAll(".emoji span").forEach(e => e.classList.remove("active"));
  event.target.classList.add("active");
}

function submitFeedback() {
  if (!selectedRating) {
    alert("Please rate your experience.");
    return;
  }

  const feedbackData = {
    rating: selectedRating,
    mood: selectedMood,
    comment: document.getElementById("feedbackText").value,
    page: window.location.href,
    time: new Date().toISOString()
  };

  let allFeedback = JSON.parse(localStorage.getItem("pageFeedback") || "[]");
  allFeedback.push(feedbackData);
  localStorage.setItem("pageFeedback", JSON.stringify(allFeedback));

  document.getElementById("formCard").classList.add("hidden");
  document.getElementById("thankYouCard").classList.remove("hidden");

  console.log("Saved UX feedback:", feedbackData);
}

createRating();
</script>

</body>
</html>
